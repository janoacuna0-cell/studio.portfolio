<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO. | Diseño de Autor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            line-height: 1.2 !important;
            letter-spacing: -0.01em;
        }

        .stroke-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
            color: transparent;
        }

        /* Glassmorphism para el Nav */
        .glass-nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Orbe de color interactivo */
        .color-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            transition: background 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .custom-cursor {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 9999;
            transition: transform 0.15s ease;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const translations = {
            es: {
                nav: { projects: 'Proyectos', about: 'Nosotros', action: 'Hablemos' },
                hero: {
                    tag: 'Estudio de Diseño Digital',
                    title: 'DISEÑO QUE',
                    italic: 'IMPORTA.',
                    desc: 'Elevamos visiones a través de interfaces minimalistas y estrategias de alto impacto.',
                    btn: 'Explorar'
                },
                about: {
                    tag: 'Esencia',
                    title: 'DOS MENTES, UNA MISIÓN.',
                    p: 'Fusionamos la lógica de la Ingeniería con la estrategia de la Economía para crear sistemas digitales que no solo brillan, sino que funcionan.',
                    stat1: 'Años',
                    stat2: 'Enfoque'
                },
                projects: {
                    title: 'PROYECTOS',
                    italic: 'SELECCIONADOS',
                    case: 'Ver sitio'
                },
                contact: {
                    title: '¿CONECTAMOS?',
                    desc: 'Si buscas calidad y atención al detalle, estás en el lugar correcto.',
                    btn: 'WhatsApp Directo',
                    waMsg: 'Hola! Venimos de la página de Studio.'
                }
            },
            en: {
                nav: { projects: 'Work', about: 'About', action: 'Contact' },
                hero: {
                    tag: 'Digital Design Studio',
                    title: 'DESIGN THAT',
                    italic: 'MATTERS.',
                    desc: 'Elevating visions through minimalist interfaces and high-impact strategies.',
                    btn: 'Explore'
                },
                about: {
                    tag: 'Essence',
                    title: 'TWO MINDS, ONE MISSION.',
                    p: 'Merging Engineering logic with Economic strategy to build digital systems that don’t just shine, they work.',
                    stat1: 'Years',
                    stat2: 'Focus'
                },
                projects: {
                    title: 'SELECTED',
                    italic: 'WORKS',
                    case: 'Visit'
                },
                contact: {
                    title: 'LET’S TALK?',
                    desc: 'If you are looking for quality and attention to detail, you are in the right place.',
                    btn: 'Direct WhatsApp',
                    waMsg: 'Hi! We are coming from the Studio website.'
                }
            }
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            // Color inicial (Azul Studio)
            const defaultColor = 'rgba(59, 130, 246, 0.4)';
            const [orbColor, setOrbColor] = useState(defaultColor);
            const t = translations[lang];

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            const projects = [
                { 
                    title: "Guanaco Hostel", 
                    cat: "Travel", 
                    link: "https://guanacohostel.vercel.app/",
                    color: "rgba(245, 158, 11, 0.5)" // Naranja Ámbar
                },
                { 
                    title: "Holy Donas", 
                    cat: "Food", 
                    link: "https://holydonas.vercel.app/",
                    color: "rgba(251, 191, 36, 0.5)" // Amarillo Sutil
                },
                { 
                    title: "Banco de Sangre", 
                    cat: "Health", 
                    link: "https://bancodesangremdy.vercel.app/",
                    color: "rgba(239, 68, 68, 0.5)" // Rojo Médico
                },
                { 
                    title: "Studio Lab", 
                    cat: "Experimental", 
                    link: "#",
                    color: "rgba(255, 255, 255, 0.3)" // Blanco Neutro
                }
            ];

            return (
                <div className="bg-black min-h-screen text-white select-none relative overflow-x-hidden">
                    {/* Orbe Interactivo de Color Dinámico */}
                    <motion.div 
                        className="color-orb hidden lg:block"
                        animate={{ 
                            left: mousePos.x - 250, 
                            top: mousePos.y - 250,
                            background: orbColor
                        }}
                        transition={{ type: 'spring', damping: 35, stiffness: 60 }}
                    />

                    <div className="custom-cursor hidden lg:block" style={{ left: `${mousePos.x}px`, top: `${mousePos.y}px` }} />

                    {/* Navbar con Glassmorphism mejorado */}
                    <nav className="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-12 py-6 glass-nav">
                        <div className="text-xl font-black tracking-tighter">STUDIO<span className="text-blue-500">.</span></div>
                        <div className="hidden md:flex gap-10 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400 items-center">
                            {['projects', 'about'].map(i => (
                                <a key={i} href={`#${i}`} className="hover:text-white transition-colors">{t.nav[i]}</a>
                            ))}
                            <button onClick={() => setLang(lang === 'es' ? 'en' : 'es')} className="opacity-50 hover:opacity-100 transition-opacity">
                                {lang === 'es' ? 'EN' : 'ES'}
                            </button>
                        </div>
                        <a href={`https://wa.me/5492804298909?text=${encodeURIComponent(t.contact.waMsg)}`} className="text-[10px] font-bold uppercase tracking-widest border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition-all">
                            {t.nav.action}
                        </a>
                    </nav>

                    {/* Hero */}
                    <section className="h-screen flex flex-col items-center justify-center text-center px-6 pt-20 relative z-10">
                        <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} className="space-y-6">
                            <p className="text-zinc-500 text-[10px] uppercase tracking-[0.4em] mb-4">{t.hero.tag}</p>
                            <h1 className="text-5xl md:text-7xl lg:text-8xl font-extrabold tracking-tighter max-w-4xl mx-auto leading-none">
                                {t.hero.title} <br />
                                <span className="stroke-text">{t.hero.italic}</span>
                            </h1>
                            <p className="text-zinc-500 text-sm md:text-base max-w-sm mx-auto font-light leading-relaxed">
                                {t.hero.desc}
                            </p>
                            <div className="pt-8">
                                <a href="#projects" className="inline-block px-10 py-4 bg-white text-black rounded-full text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-all">
                                    {t.hero.btn}
                                </a>
                            </div>
                        </motion.div>
                    </section>

                    {/* About */}
                    <section id="about" className="py-40 px-8 relative z-10">
                        <div className="max-w-3xl mx-auto text-center space-y-12">
                            <span className="text-blue-500 text-[10px] font-bold uppercase tracking-widest">{t.about.tag}</span>
                            <h2 className="text-4xl md:text-6xl font-black tracking-tighter leading-tight">{t.about.title}</h2>
                            <p className="text-zinc-400 text-lg md:text-xl font-light leading-relaxed">{t.about.p}</p>
                            <div className="flex justify-center gap-16 md:gap-24 pt-10">
                                <div><h4 className="text-3xl font-bold">20</h4><p className="text-zinc-600 text-[9px] uppercase tracking-widest mt-2">{t.about.stat1}</p></div>
                                <div><h4 className="text-3xl font-bold">100%</h4><p className="text-zinc-600 text-[9px] uppercase tracking-widest mt-2">{t.about.stat2}</p></div>
                            </div>
                        </div>
                    </section>

                    {/* Proyectos con interacción de color */}
                    <section id="projects" className="py-24 px-8 relative z-10">
                        <div className="max-w-6xl mx-auto">
                            <h2 className="text-[10px] font-bold tracking-[0.4em] mb-16 text-zinc-600 uppercase">
                                <span className="text-blue-500">//</span> {t.projects.title} {t.projects.italic}
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-16">
                                {projects.map((p, i) => (
                                    <motion.div 
                                        whileHover={{ y: -10 }} 
                                        key={i} 
                                        className="group cursor-pointer"
                                        onMouseEnter={() => setOrbColor(p.color)}
                                        onMouseLeave={() => setOrbColor(defaultColor)}
                                    >
                                        <div className="aspect-video bg-zinc-900/40 rounded-3xl mb-6 overflow-hidden relative border border-white/5">
                                            <div className="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity" />
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all translate-y-4 group-hover:translate-y-0">
                                                <a href={p.link} target="_blank" className="text-[10px] font-bold uppercase tracking-widest bg-white text-black px-6 py-2.5 rounded-full">{t.projects.case}</a>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center px-2">
                                            <h3 className="text-lg font-bold tracking-tight group-hover:text-blue-400 transition-colors">{p.title}</h3>
                                            <span className="text-[9px] font-bold text-zinc-600 uppercase tracking-widest border border-zinc-800 px-2 py-0.5 rounded group-hover:border-zinc-500 transition-colors">{p.cat}</span>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contacto */}
                    <section id="contact" className="py-48 md:py-60 px-8 text-center relative z-10">
                        <div className="max-w-4xl mx-auto space-y-12">
                            <h2 className="text-6xl md:text-8xl font-black tracking-tighter italic uppercase stroke-text leading-[1.1]">
                                {t.contact.title}
                            </h2>
                            <p className="text-zinc-500 text-sm md:text-lg max-w-xs mx-auto font-light leading-relaxed">
                                {t.contact.desc}
                            </p>
                            <div className="pt-10">
                                <a 
                                    href={`https://wa.me/5492804298909?text=${encodeURIComponent(t.contact.waMsg)}`}
                                    className="inline-block bg-white text-black px-12 py-5 rounded-full text-[11px] font-black uppercase tracking-widest hover:scale-105 hover:bg-blue-500 hover:text-white transition-all shadow-xl shadow-blue-500/10"
                                >
                                    {t.contact.btn}
                                </a>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-zinc-900 text-center text-zinc-700 text-[9px] uppercase tracking-[0.5em] relative z-10">
                        <p>© STUDIO. // DIGITAL ATELIER</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
